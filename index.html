<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi 投资仪表盘</title>
<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --border: #1e1e2e;
  --green: #00ffb4;
  --red: #ff4757;
  --amber: #ffb800;
  --blue: #4facfe;
  --purple: #a855f7;
  --text: #e0e0e0;
  --muted: #666;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; min-height: 100vh; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, #111118 0%, var(--bg) 100%); flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--green), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header .meta { font-size: 13px; color: var(--muted); }

/* Status bar */
.status-bar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.status-bar .time-info { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
.source-status { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); }
.source-status .dot-s { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.source-status .dot-s.ok { background: var(--green); }
.source-status .dot-s.warn { background: var(--amber); }
.source-status .dot-s.err { background: var(--red); }
.source-status .dot-s.loading { background: var(--muted); animation: pulse 1s infinite; }
.refresh-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.refresh-btn:hover { border-color: var(--green); color: var(--green); }
.refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.throttle-badge { font-size: 11px; color: var(--amber); padding: 2px 8px; border-radius: 4px; background: rgba(255,184,0,0.1); display: none; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* Dashboard grid */
.dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; padding: 24px 32px; max-width: 1600px; margin: 0 auto; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; transition: border-color 0.2s; position: relative; }
.card:hover { border-color: #2a2a3e; }
.card-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title .icon { font-size: 16px; }
.card.wide { grid-column: span 2; }

/* Error overlay for cards */
.card-error { padding: 16px; background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.2); border-radius: 8px; font-size: 13px; color: var(--red); }
.card-error .err-title { font-weight: 600; margin-bottom: 4px; }
.card-error .err-detail { color: var(--muted); font-size: 12px; }

/* Big number */
.big-num { font-size: 36px; font-weight: 700; font-variant-numeric: tabular-nums; }
.change { font-size: 14px; font-weight: 600; margin-left: 8px; }
.change.up { color: var(--green); }
.change.down { color: var(--red); }
.change.flat { color: var(--muted); }
.sub-text { font-size: 13px; color: var(--muted); margin-top: 6px; }

/* Fear & Greed gauge */
.gauge-wrap { display: flex; align-items: center; gap: 20px; margin-top: 12px; }
.gauge-bar { flex: 1; height: 8px; border-radius: 4px; background: linear-gradient(90deg, var(--red), var(--amber), var(--green)); position: relative; }
.gauge-marker { position: absolute; top: -6px; width: 20px; height: 20px; border-radius: 50%; border: 3px solid #fff; transform: translateX(-50%); transition: left 0.5s; }
.gauge-label { font-size: 28px; font-weight: 700; min-width: 50px; text-align: center; }

/* Stock table */
.stock-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.search-input { background: #1a1a24; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 13px; color: var(--text); outline: none; width: 160px; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--green); }
.search-input::placeholder { color: var(--muted); }
.stock-table-wrap { overflow-x: auto; }
.stock-table { width: 100%; border-collapse: collapse; }
.stock-table th { text-align: left; font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; padding: 8px 6px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; position: sticky; top: 0; background: var(--card); z-index: 1; }
.stock-table th:hover { color: var(--text); }
.stock-table th .sort-arrow { margin-left: 4px; font-size: 10px; }
.stock-table th.sorted { color: var(--green); }
.stock-table td { padding: 10px 6px; font-size: 14px; border-bottom: 1px solid #1a1a24; font-variant-numeric: tabular-nums; }
.stock-table tr:last-child td { border-bottom: none; }
.ticker { font-weight: 700; color: var(--blue); }

/* Score badge enhanced */
.score-badge { display: inline-block; padding: 4px 12px; border-radius: 6px; font-weight: 700; font-size: 13px; }
.score-badge.a { background: rgba(0,255,180,0.15); color: var(--green); }
.score-badge.b { background: rgba(79,172,254,0.15); color: var(--blue); }
.score-badge.c { background: rgba(255,184,0,0.15); color: var(--amber); }
.score-badge.d { background: rgba(255,71,87,0.15); color: var(--red); }
.score-badge.na { background: rgba(100,100,100,0.1); color: var(--muted); }

/* Color-coded change cells */
.change-cell { font-weight: 600; }
.change-cell.strong-up { color: var(--green); }
.change-cell.mild-up { color: #66cc99; }
.change-cell.flat { color: var(--muted); }
.change-cell.mild-down { color: #cc6666; }
.change-cell.strong-down { color: var(--red); }

/* Mini grid */
.mini-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 12px; }
.mini-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.mini-stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
.mini-stat .value { font-size: 18px; font-weight: 700; margin-top: 2px; }

/* News */
.news-item { padding: 12px 0; border-bottom: 1px solid #1a1a24; }
.news-item:last-child { border-bottom: none; }
.news-item .title { font-size: 14px; font-weight: 500; line-height: 1.4; }
.news-item .source { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* Tabs */
.tabs { display: flex; gap: 4px; }
.tab { padding: 6px 14px; border-radius: 8px; font-size: 12px; background: none; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.2s; }
.tab.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }
.tab:hover:not(.active) { border-color: #333; color: var(--text); }

/* Skeleton */
.skeleton { background: linear-gradient(90deg, #1a1a24 25%, #222230 50%, #1a1a24 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; height: 20px; margin: 4px 0; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

@media (max-width: 768px) {
  .dashboard { grid-template-columns: 1fr; padding: 16px; }
  .card.wide { grid-column: span 1; }
  .header { padding: 16px; }
  .big-num { font-size: 28px; }
  .mini-grid { grid-template-columns: 1fr 1fr; }
  .stock-controls { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>✨ Lumi 投资仪表盘</h1>
    <div class="meta">Powered by Lumi · Real-time Market Intelligence</div>
  </div>
  <div class="status-bar">
    <span class="time-info" id="lastUpdate">加载中...</span>
    <div class="source-status" id="srcCoinGecko"><span class="dot-s loading"></span> CoinGecko</div>
    <div class="source-status" id="srcYahoo"><span class="dot-s loading"></span> Yahoo</div>
    <div class="source-status" id="srcFnG"><span class="dot-s loading"></span> F&G</div>
    <span class="throttle-badge" id="throttleBadge">⏳ 限频退避中</span>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">↻ 刷新</button>
  </div>
</div>

<div class="dashboard">
  <!-- BTC Card -->
  <div class="card" id="cardBTC">
    <div class="card-title"><span class="icon">₿</span> Bitcoin</div>
    <div id="btcPrice" class="big-num"><div class="skeleton" style="width:200px;height:36px"></div></div>
    <div id="btcChange" class="sub-text"></div>
    <div class="mini-grid" id="btcStats">
      <div class="mini-stat"><div class="label">24H 涨跌</div><div class="value" id="btc24h">—</div></div>
      <div class="mini-stat"><div class="label">7D 涨跌</div><div class="value" id="btc7d">—</div></div>
      <div class="mini-stat"><div class="label">距 ATH</div><div class="value" id="btcATH">—</div></div>
      <div class="mini-stat"><div class="label">24H 高</div><div class="value" id="btcHigh">—</div></div>
      <div class="mini-stat"><div class="label">24H 低</div><div class="value" id="btcLow">—</div></div>
      <div class="mini-stat"><div class="label">市值</div><div class="value" id="btcMcap">—</div></div>
    </div>
  </div>

  <!-- Fear & Greed -->
  <div class="card" id="cardFG">
    <div class="card-title"><span class="icon">🧭</span> Fear & Greed 指数</div>
    <div class="gauge-wrap">
      <div class="gauge-label" id="fgValue">—</div>
      <div style="flex:1">
        <div id="fgLabel" style="font-size:14px;font-weight:600;margin-bottom:8px">—</div>
        <div class="gauge-bar"><div class="gauge-marker" id="fgMarker" style="left:50%"></div></div>
      </div>
    </div>
    <div class="sub-text" style="margin-top:16px" id="fgHistory"></div>
  </div>

  <!-- Watchlist -->
  <div class="card wide" id="cardStocks">
    <div class="card-title"><span class="icon">📊</span> 自选股</div>
    <div class="stock-controls">
      <div class="tabs">
        <button class="tab active" onclick="switchTab(this,'all')">全部</button>
        <button class="tab" onclick="switchTab(this,'tech')">科技</button>
        <button class="tab" onclick="switchTab(this,'finance')">金融</button>
        <button class="tab" onclick="switchTab(this,'energy')">能源</button>
      </div>
      <input type="text" class="search-input" id="stockSearch" placeholder="搜索 ticker..." oninput="filterStocks()">
    </div>
    <div class="stock-table-wrap">
    <table class="stock-table">
      <thead>
        <tr>
          <th onclick="sortStocks('ticker')">代码 <span class="sort-arrow" id="sort-ticker"></span></th>
          <th onclick="sortStocks('name')">名称 <span class="sort-arrow" id="sort-name"></span></th>
          <th style="text-align:right" onclick="sortStocks('price')">价格 <span class="sort-arrow" id="sort-price"></span></th>
          <th style="text-align:right" onclick="sortStocks('change')">涨跌 <span class="sort-arrow" id="sort-change"></span></th>
          <th style="text-align:right" onclick="sortStocks('score')">评分 <span class="sort-arrow" id="sort-score"></span></th>
        </tr>
      </thead>
      <tbody id="stockList">
        <tr><td colspan="5"><div class="skeleton" style="width:100%;height:200px"></div></td></tr>
      </tbody>
    </table>
    </div>
  </div>

  <!-- Crypto Market -->
  <div class="card" id="cardCrypto">
    <div class="card-title"><span class="icon">🪙</span> 加密货币市场</div>
    <div id="cryptoList"><div class="skeleton" style="width:100%;height:150px"></div></div>
  </div>

  <!-- Market News -->
  <div class="card" id="cardNews">
    <div class="card-title"><span class="icon">📰</span> 市场快讯</div>
    <div id="newsList"><div class="skeleton" style="width:100%;height:150px"></div></div>
  </div>

  <!-- Lumi Reports -->
  <div class="card" id="cardReports">
    <div class="card-title"><span class="icon">📋</span> Lumi 分析报告</div>
    <div id="reportList"></div>
  </div>

  <!-- Market Overview -->
  <div class="card" id="cardGlobal">
    <div class="card-title"><span class="icon">🌍</span> 全球市场概览</div>
    <div id="globalMarket"><div class="skeleton" style="width:100%;height:150px"></div></div>
  </div>
</div>

<script>
// ===== CONFIG =====
const WATCHLIST = [
  { ticker: 'SOFI', name: 'SoFi Technologies', sector: 'finance', score: 75, rating: 'buy' },
  { ticker: 'AMD', name: 'Advanced Micro Devices', sector: 'tech', score: 80, rating: 'buy' },
  { ticker: 'BE', name: 'Bloom Energy', sector: 'energy', score: 70, rating: 'buy' },
  { ticker: 'AVAV', name: 'AeroVironment', sector: 'tech', score: 70, rating: 'buy' },
  { ticker: 'RCAT', name: 'Red Cat Holdings', sector: 'tech', score: 50, rating: 'hold' },
  { ticker: 'SMR', name: 'NuScale Power', sector: 'energy', score: null, rating: 'hold' },
  { ticker: 'AAPL', name: 'Apple', sector: 'tech', score: null, rating: null },
  { ticker: 'NVDA', name: 'NVIDIA', sector: 'tech', score: null, rating: null },
  { ticker: 'TSLA', name: 'Tesla', sector: 'tech', score: null, rating: null },
  { ticker: 'GOOGL', name: 'Alphabet', sector: 'tech', score: null, rating: null },
];
const REPORTS = [
  { ticker: 'SOFI', title: 'SoFi Technologies 投资分析', score: 75, date: '2026-03-02' },
  { ticker: 'AMD', title: 'AMD 全面分析报告', score: 80, date: '2026-03-01' },
  { ticker: 'BTC', title: 'BTC 投资分析与策略', score: null, date: '2026-03-01' },
  { ticker: 'BE', title: 'Bloom Energy 深度报告', score: 70, date: '2026-02-28' },
  { ticker: 'DRONE', title: '无人机板块五公司报告', score: null, date: '2026-02-28' },
];

// Color thresholds (configurable)
const CHANGE_STRONG = 2; // |change| > 2% → strong color

// ===== STATE =====
let _stockData = [];
let _currentFilter = 'all';
let _currentSort = { key: null, asc: true };
let _searchQuery = '';
let _refreshInterval = 60000; // 60s default
let _refreshTimer = null;
let _failCounts = { coingecko: 0, yahoo: 0, fng: 0 };

// ===== UTILS =====
const fmt = (n, d=2) => n == null ? '—' : n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
const fmtB = (n) => {
  if (n == null) return '—';
  if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  return fmt(n, 0);
};
const changeHtml = (pct) => {
  if (pct == null) return '<span class="change flat">—</span>';
  const cls = pct >= 0 ? 'up' : 'down';
  const arrow = pct >= 0 ? '▲' : '▼';
  return `<span class="change ${cls}">${arrow} ${Math.abs(pct).toFixed(2)}%</span>`;
};
const changeCellClass = (pct) => {
  if (pct == null) return 'flat';
  if (pct > CHANGE_STRONG) return 'strong-up';
  if (pct > 0) return 'mild-up';
  if (pct > -CHANGE_STRONG) return 'mild-down';
  return 'strong-down';
};
const scoreGrade = (score) => {
  if (score == null) return { grade: '—', cls: 'na' };
  if (score >= 80) return { grade: 'A', cls: 'a' };
  if (score >= 70) return { grade: 'B', cls: 'b' };
  if (score >= 55) return { grade: 'C', cls: 'c' };
  return { grade: 'D', cls: 'd' };
};
const scoreBadge = (score) => {
  const { grade, cls } = scoreGrade(score);
  return `<span class="score-badge ${cls}">${score != null ? score + ' ' + grade : '—'}</span>`;
};

// ===== SOURCE STATUS =====
function setSourceStatus(id, status, detail) {
  const el = document.getElementById(id);
  if (!el) return;
  const dot = el.querySelector('.dot-s');
  dot.className = 'dot-s ' + (status === 'ok' ? 'ok' : status === 'warn' ? 'warn' : status === 'err' ? 'err' : 'loading');
  el.title = detail || '';
}

function showCardError(containerId, title, detail) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `<div class="card-error"><div class="err-title">⚠️ ${title}</div><div class="err-detail">${detail}</div></div>`;
}

// ===== EXPONENTIAL BACKOFF =====
function backoff(source) {
  _failCounts[source] = (_failCounts[source] || 0) + 1;
  const count = _failCounts[source];
  // Show throttle badge if any source has failed 2+ times
  if (count >= 2) {
    document.getElementById('throttleBadge').style.display = 'inline';
  }
}
function resetFail(source) {
  _failCounts[source] = 0;
  // Hide throttle badge if all sources healthy
  if (Object.values(_failCounts).every(c => c === 0)) {
    document.getElementById('throttleBadge').style.display = 'none';
  }
}
function getInterval() {
  const maxFails = Math.max(...Object.values(_failCounts));
  if (maxFails >= 3) return 300000; // 5 min
  if (maxFails >= 2) return 120000; // 2 min
  return 60000; // 1 min
}

// ===== DATA FETCHING (each independent try/catch) =====

async function fetchBTC() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin?localization=false&tickers=false&community_data=false&developer_data=false&sparkline=false');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    const md = d.market_data;
    const price = md.current_price.usd;
    const change24 = md.price_change_percentage_24h;
    const change7d = md.price_change_percentage_7d;
    const ath = md.ath.usd;
    const athPct = ((price / ath) - 1) * 100;

    document.getElementById('btcPrice').innerHTML = `$${fmt(price, 0)} ${changeHtml(change24)}`;
    document.getElementById('btcChange').textContent = `ATH: $${fmt(ath, 0)}`;

    // 3 key indicators
    const h = (id, val, isCurrency) => {
      const el = document.getElementById(id);
      if (isCurrency) { el.textContent = '$' + fmt(val, 0); return; }
      el.innerHTML = changeHtml(val);
    };
    document.getElementById('btc24h').innerHTML = changeHtml(change24);
    document.getElementById('btc7d').innerHTML = changeHtml(change7d);
    document.getElementById('btcATH').innerHTML = `<span class="change down">${athPct.toFixed(1)}%</span>`;
    document.getElementById('btcHigh').textContent = '$' + fmt(md.high_24h.usd, 0);
    document.getElementById('btcLow').textContent = '$' + fmt(md.low_24h.usd, 0);
    document.getElementById('btcMcap').textContent = fmtB(md.market_cap.usd);

    resetFail('coingecko');
    setSourceStatus('srcCoinGecko', 'ok', `BTC $${fmt(price,0)}`);
  } catch(e) {
    backoff('coingecko');
    const isRate = e.message.includes('429') || e.message.includes('rate');
    setSourceStatus('srcCoinGecko', isRate ? 'warn' : 'err', e.message);
    showCardError('btcPrice', '数据暂不可用', isRate ? '接口限频，将自动重试' : e.message);
  }
}

async function fetchFearGreed() {
  try {
    const r = await fetch('https://api.alternative.me/fng/?limit=7');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const current = d.data[0];
    const val = parseInt(current.value);
    const label = current.value_classification;
    const getColor = v => v <= 25 ? 'var(--red)' : v <= 45 ? 'var(--amber)' : v <= 55 ? 'var(--text)' : 'var(--green)';

    document.getElementById('fgValue').textContent = val;
    document.getElementById('fgValue').style.color = getColor(val);
    document.getElementById('fgLabel').textContent = label;
    document.getElementById('fgLabel').style.color = getColor(val);
    document.getElementById('fgMarker').style.left = val + '%';
    document.getElementById('fgMarker').style.background = getColor(val);

    const hist = d.data.slice(0, 7).map(x => {
      const dt = new Date(x.timestamp * 1000);
      return `${dt.getMonth()+1}/${dt.getDate()} ${x.value}`;
    }).join(' → ');
    document.getElementById('fgHistory').textContent = '7日: ' + hist;

    resetFail('fng');
    setSourceStatus('srcFnG', 'ok', `${val} ${label}`);
  } catch(e) {
    backoff('fng');
    setSourceStatus('srcFnG', 'err', e.message);
    document.getElementById('fgValue').textContent = '?';
    document.getElementById('fgLabel').textContent = '数据暂不可用';
    document.getElementById('fgHistory').textContent = e.message;
  }
}

async function fetchStocks() {
  let anySuccess = false;
  let anyFail = false;
  const results = await Promise.all(WATCHLIST.map(async (w) => {
    try {
      const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${w.ticker}?interval=1d&range=5d`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      if (d.chart.error) throw new Error(d.chart.error.description || 'Yahoo error');
      const meta = d.chart.result[0].meta;
      const price = meta.regularMarketPrice;
      const prevClose = meta.chartPreviousClose;
      const change = prevClose ? ((price / prevClose) - 1) * 100 : null;
      anySuccess = true;
      return { ...w, price, change, loaded: true };
    } catch(e) {
      anyFail = true;
      return { ...w, price: null, change: null, loaded: false, error: e.message };
    }
  }));

  _stockData = results;

  if (anySuccess) {
    resetFail('yahoo');
    setSourceStatus('srcYahoo', anyFail ? 'warn' : 'ok', anyFail ? '部分股票加载失败' : `${results.length} 只股票`);
  } else {
    backoff('yahoo');
    setSourceStatus('srcYahoo', 'err', '所有股票加载失败');
  }
  renderStocks();
}

// ===== STOCK TABLE: Sort + Search + Filter =====

function renderStocks() {
  let data = [..._stockData];

  // Filter by sector
  if (_currentFilter !== 'all') data = data.filter(s => s.sector === _currentFilter);

  // Filter by search
  if (_searchQuery) {
    const q = _searchQuery.toUpperCase();
    data = data.filter(s => s.ticker.includes(q) || s.name.toUpperCase().includes(q));
  }

  // Sort
  if (_currentSort.key) {
    data.sort((a, b) => {
      let va = a[_currentSort.key], vb = b[_currentSort.key];
      if (va == null) va = _currentSort.asc ? Infinity : -Infinity;
      if (vb == null) vb = _currentSort.asc ? Infinity : -Infinity;
      if (typeof va === 'string') return _currentSort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
      return _currentSort.asc ? va - vb : vb - va;
    });
  }

  // Update sort arrows
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  document.querySelectorAll('.stock-table th').forEach(el => el.classList.remove('sorted'));
  if (_currentSort.key) {
    const arrowEl = document.getElementById('sort-' + _currentSort.key);
    if (arrowEl) {
      arrowEl.textContent = _currentSort.asc ? '▲' : '▼';
      arrowEl.closest('th').classList.add('sorted');
    }
  }

  const tbody = document.getElementById('stockList');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">无匹配结果</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(s => {
    const chgCls = changeCellClass(s.change);
    const errNote = (!s.loaded && s.error) ? `<span style="font-size:11px;color:var(--red)" title="${s.error}"> ⚠️</span>` : '';
    return `<tr>
      <td><span class="ticker">${s.ticker}</span>${errNote}</td>
      <td>${s.name}</td>
      <td style="text-align:right;font-weight:600">${s.price != null ? '$' + fmt(s.price) : '<span style="color:var(--muted)">—</span>'}</td>
      <td style="text-align:right" class="change-cell ${chgCls}">${s.change != null ? (s.change >= 0 ? '▲' : '▼') + ' ' + Math.abs(s.change).toFixed(2) + '%' : '—'}</td>
      <td style="text-align:right">${scoreBadge(s.score)}</td>
    </tr>`;
  }).join('');
}

function sortStocks(key) {
  if (_currentSort.key === key) {
    _currentSort.asc = !_currentSort.asc;
  } else {
    _currentSort = { key, asc: key === 'ticker' || key === 'name' };
  }
  renderStocks();
}

function filterStocks() {
  _searchQuery = document.getElementById('stockSearch').value.trim();
  renderStocks();
}

function switchTab(el, filter) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  _currentFilter = filter;
  renderStocks();
}

// ===== CRYPTO =====
async function fetchCrypto() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=8&sparkline=false&price_change_percentage=24h,7d');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const coins = await r.json();
    if (!Array.isArray(coins)) throw new Error('Invalid response');
    document.getElementById('cryptoList').innerHTML = coins.map(c => {
      const chgCls = changeCellClass(c.price_change_percentage_24h);
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a24">
        <div style="display:flex;align-items:center;gap:8px">
          <img src="${c.image}" width="20" height="20" style="border-radius:50%" loading="lazy">
          <span style="font-weight:600">${c.symbol.toUpperCase()}</span>
          <span style="color:var(--muted);font-size:12px">#${c.market_cap_rank}</span>
        </div>
        <div style="text-align:right">
          <div style="font-weight:600">$${fmt(c.current_price, c.current_price > 100 ? 0 : 2)}</div>
          <div class="change-cell ${chgCls}" style="font-size:13px">${c.price_change_percentage_24h != null ? (c.price_change_percentage_24h >= 0 ? '▲':'▼') + Math.abs(c.price_change_percentage_24h).toFixed(2) + '%' : '—'}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    showCardError('cryptoList', '加密货币数据暂不可用', e.message.includes('429') ? '接口限频，稍后自动重试' : e.message);
  }
}

// ===== GLOBAL MARKET =====
async function fetchGlobalMarket() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/global');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = (await r.json()).data;
    document.getElementById('globalMarket').innerHTML = `
      <div class="mini-grid cols-2">
        <div class="mini-stat"><div class="label">加密总市值</div><div class="value">$${fmtB(d.total_market_cap.usd)}</div></div>
        <div class="mini-stat"><div class="label">24h 总成交</div><div class="value">$${fmtB(d.total_volume.usd)}</div></div>
        <div class="mini-stat"><div class="label">BTC 占比</div><div class="value">${d.market_cap_percentage.btc.toFixed(1)}%</div></div>
        <div class="mini-stat"><div class="label">ETH 占比</div><div class="value">${d.market_cap_percentage.eth.toFixed(1)}%</div></div>
        <div class="mini-stat"><div class="label">活跃币种</div><div class="value">${d.active_cryptocurrencies?.toLocaleString() || '—'}</div></div>
        <div class="mini-stat"><div class="label">24h 涨跌</div><div class="value">${changeHtml(d.market_cap_change_percentage_24h_usd)}</div></div>
      </div>`;
  } catch(e) {
    showCardError('globalMarket', '全球市场数据暂不可用', e.message);
  }
}

// ===== REFRESH LOGIC =====
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '↻ 刷新中...';
  document.getElementById('lastUpdate').textContent = '刷新中...';

  // All fetches independent — one failure won't block others
  await Promise.allSettled([
    fetchBTC(),
    fetchFearGreed(),
    fetchStocks(),
    fetchCrypto(),
    fetchGlobalMarket(),
  ]);

  renderReports();
  renderNews();

  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    `Updated: ${now.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' })}`;
  btn.disabled = false;
  btn.textContent = '↻ 刷新';

  // Adaptive interval
  scheduleRefresh();
}

function scheduleRefresh() {
  if (_refreshTimer) clearTimeout(_refreshTimer);
  const interval = getInterval();
  _refreshTimer = setTimeout(refreshAll, interval);
  // Show interval if backed off
  if (interval > 60000) {
    document.getElementById('throttleBadge').textContent = `⏳ ${interval/1000}s 后刷新`;
    document.getElementById('throttleBadge').style.display = 'inline';
  }
}

function manualRefresh() {
  // Reset fail counts on manual refresh
  _failCounts = { coingecko: 0, yahoo: 0, fng: 0 };
  document.getElementById('throttleBadge').style.display = 'none';
  refreshAll();
}

// ===== INIT =====
refreshAll();
</script>
