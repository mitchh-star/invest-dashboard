<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi 投资仪表盘</title>
<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --border: #1e1e2e;
  --green: #00ffb4;
  --red: #ff4757;
  --amber: #ffb800;
  --blue: #4facfe;
  --purple: #a855f7;
  --text: #e0e0e0;
  --muted: #666;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  min-height: 100vh;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #111118 0%, var(--bg) 100%);
}
.header h1 {
  font-size: 22px; font-weight: 700;
  background: linear-gradient(135deg, var(--green), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header .meta { font-size: 13px; color: var(--muted); }
.header .status { display: flex; align-items: center; gap: 8px; }
.header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 20px;
  padding: 24px 32px;
  max-width: 1600px;
  margin: 0 auto;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  transition: border-color 0.2s;
}
.card:hover { border-color: #2a2a3e; }
.card-title {
  font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card-title .icon { font-size: 16px; }

/* Big number */
.big-num { font-size: 36px; font-weight: 700; font-variant-numeric: tabular-nums; }
.change { font-size: 14px; font-weight: 600; margin-left: 8px; }
.change.up { color: var(--green); }
.change.down { color: var(--red); }
.sub-text { font-size: 13px; color: var(--muted); margin-top: 6px; }

/* Fear & Greed gauge */
.gauge-wrap { display: flex; align-items: center; gap: 20px; margin-top: 12px; }
.gauge-bar {
  flex: 1; height: 8px; border-radius: 4px;
  background: linear-gradient(90deg, var(--red), var(--amber), var(--green));
  position: relative;
}
.gauge-marker {
  position: absolute; top: -6px;
  width: 20px; height: 20px; border-radius: 50%;
  border: 3px solid #fff; transform: translateX(-50%);
  transition: left 0.5s;
}
.gauge-label { font-size: 28px; font-weight: 700; min-width: 50px; text-align: center; }

/* Stock table */
.stock-table { width: 100%; border-collapse: collapse; }
.stock-table th {
  text-align: left; font-size: 11px; text-transform: uppercase;
  color: var(--muted); letter-spacing: 0.5px; padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.stock-table td {
  padding: 10px 0; font-size: 14px; border-bottom: 1px solid #1a1a24;
  font-variant-numeric: tabular-nums;
}
.stock-table tr:last-child td { border-bottom: none; }
.ticker { font-weight: 700; color: var(--blue); }
.stock-name { font-size: 12px; color: var(--muted); }

/* Sparkline */
.sparkline { height: 40px; margin-top: 12px; }
.sparkline svg { width: 100%; height: 100%; }
.sparkline path { fill: none; stroke-width: 2; }

/* News */
.news-item {
  padding: 12px 0;
  border-bottom: 1px solid #1a1a24;
}
.news-item:last-child { border-bottom: none; }
.news-item .title { font-size: 14px; font-weight: 500; line-height: 1.4; }
.news-item .source { font-size: 12px; color: var(--muted); margin-top: 4px; }
.news-item a { color: var(--text); text-decoration: none; }
.news-item a:hover { color: var(--green); }

/* Wide card */
.card.wide { grid-column: span 2; }
@media (max-width: 768px) {
  .dashboard { grid-template-columns: 1fr; padding: 16px; }
  .card.wide { grid-column: span 1; }
  .header { padding: 16px; }
  .big-num { font-size: 28px; }
}

/* Score badge */
.score-badge {
  display: inline-block; padding: 4px 12px; border-radius: 6px;
  font-weight: 700; font-size: 13px;
}
.score-badge.buy { background: rgba(0,255,180,0.15); color: var(--green); }
.score-badge.hold { background: rgba(255,184,0,0.15); color: var(--amber); }
.score-badge.sell { background: rgba(255,71,87,0.15); color: var(--red); }

/* Mini chart grid */
.mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
.mini-stat { }
.mini-stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
.mini-stat .value { font-size: 18px; font-weight: 700; margin-top: 2px; }

/* Refresh btn */
.refresh-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px;
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--green); color: var(--green); }

/* Loading */
.loading { color: var(--muted); font-size: 14px; }
.skeleton {
  background: linear-gradient(90deg, #1a1a24 25%, #222230 50%, #1a1a24 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px; height: 20px; margin: 4px 0;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab {
  padding: 6px 14px; border-radius: 8px; font-size: 12px;
  background: none; border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; transition: all 0.2s;
}
.tab.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }
.tab:hover:not(.active) { border-color: #333; color: var(--text); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>✨ Lumi 投资仪表盘</h1>
    <div class="meta">Powered by Lumi • Real-time Market Intelligence</div>
  </div>
  <div class="status">
    <div class="dot"></div>
    <span class="meta" id="lastUpdate">加载中...</span>
    <button class="refresh-btn" onclick="refreshAll()">↻ 刷新</button>
  </div>
</div>

<div class="dashboard">
  <!-- BTC Card -->
  <div class="card">
    <div class="card-title"><span class="icon">₿</span> Bitcoin</div>
    <div id="btcPrice" class="big-num"><div class="skeleton" style="width:200px;height:36px"></div></div>
    <div id="btcChange" class="sub-text"></div>
    <div class="mini-grid" id="btcStats">
      <div class="mini-stat"><div class="label">24h 高</div><div class="value" id="btcHigh">—</div></div>
      <div class="mini-stat"><div class="label">24h 低</div><div class="value" id="btcLow">—</div></div>
      <div class="mini-stat"><div class="label">市值</div><div class="value" id="btcMcap">—</div></div>
      <div class="mini-stat"><div class="label">24h 成交</div><div class="value" id="btcVol">—</div></div>
    </div>
  </div>

  <!-- Fear & Greed -->
  <div class="card">
    <div class="card-title"><span class="icon">🧭</span> Fear & Greed 指数</div>
    <div class="gauge-wrap">
      <div class="gauge-label" id="fgValue">—</div>
      <div style="flex:1">
        <div id="fgLabel" style="font-size:14px;font-weight:600;margin-bottom:8px">—</div>
        <div class="gauge-bar">
          <div class="gauge-marker" id="fgMarker" style="left:50%"></div>
        </div>
      </div>
    </div>
    <div class="sub-text" style="margin-top:16px" id="fgHistory"></div>
  </div>

  <!-- Watchlist -->
  <div class="card wide">
    <div class="card-title"><span class="icon">📊</span> 自选股</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(this,'all')">全部</button>
      <button class="tab" onclick="switchTab(this,'tech')">科技</button>
      <button class="tab" onclick="switchTab(this,'finance')">金融</button>
      <button class="tab" onclick="switchTab(this,'energy')">能源</button>
    </div>
    <table class="stock-table">
      <thead>
        <tr>
          <th>代码</th>
          <th>名称</th>
          <th style="text-align:right">价格</th>
          <th style="text-align:right">涨跌</th>
          <th style="text-align:right">市值</th>
          <th style="text-align:right">PE</th>
          <th style="text-align:right">评分</th>
        </tr>
      </thead>
      <tbody id="stockList">
        <tr><td colspan="7"><div class="skeleton" style="width:100%;height:200px"></div></td></tr>
      </tbody>
    </table>
  </div>

  <!-- Crypto Market -->
  <div class="card">
    <div class="card-title"><span class="icon">🪙</span> 加密货币市场</div>
    <div id="cryptoList">
      <div class="skeleton" style="width:100%;height:150px"></div>
    </div>
  </div>

  <!-- Market News -->
  <div class="card">
    <div class="card-title"><span class="icon">📰</span> 市场快讯</div>
    <div id="newsList">
      <div class="skeleton" style="width:100%;height:150px"></div>
    </div>
  </div>

  <!-- Lumi Reports -->
  <div class="card">
    <div class="card-title"><span class="icon">📋</span> Lumi 分析报告</div>
    <div id="reportList"></div>
  </div>

  <!-- Market Overview -->
  <div class="card">
    <div class="card-title"><span class="icon">🌍</span> 全球市场概览</div>
    <div id="globalMarket">
      <div class="skeleton" style="width:100%;height:150px"></div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const WATCHLIST = [
  { ticker: 'SOFI', name: 'SoFi Technologies', sector: 'finance', score: 75, rating: 'buy' },
  { ticker: 'AMD', name: 'Advanced Micro Devices', sector: 'tech', score: 80, rating: 'buy' },
  { ticker: 'BE', name: 'Bloom Energy', sector: 'energy', score: 70, rating: 'buy' },
  { ticker: 'AVAV', name: 'AeroVironment', sector: 'tech', score: 70, rating: 'buy' },
  { ticker: 'RCAT', name: 'Red Cat Holdings', sector: 'tech', score: 50, rating: 'hold' },
  { ticker: 'SMR', name: 'NuScale Power', sector: 'energy', score: null, rating: 'hold' },
  { ticker: 'AAPL', name: 'Apple', sector: 'tech', score: null, rating: null },
  { ticker: 'NVDA', name: 'NVIDIA', sector: 'tech', score: null, rating: null },
  { ticker: 'TSLA', name: 'Tesla', sector: 'tech', score: null, rating: null },
  { ticker: 'GOOGL', name: 'Alphabet', sector: 'tech', score: null, rating: null },
];

const REPORTS = [
  { ticker: 'SOFI', title: 'SoFi Technologies 投资分析', score: 75, date: '2026-03-02' },
  { ticker: 'AMD', title: 'AMD 全面分析报告', score: 80, date: '2026-03-01' },
  { ticker: 'BTC', title: 'BTC 投资分析与策略', score: null, date: '2026-03-01' },
  { ticker: 'BE', title: 'Bloom Energy 深度报告', score: 70, date: '2026-02-28' },
  { ticker: 'DRONE', title: '无人机板块五公司报告', score: null, date: '2026-02-28' },
];

// ===== UTILS =====
const fmt = (n, decimals=2) => {
  if (n == null) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
};
const fmtB = (n) => {
  if (n == null) return '—';
  if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  return fmt(n, 0);
};
const changeHtml = (pct) => {
  if (pct == null) return '';
  const cls = pct >= 0 ? 'up' : 'down';
  const arrow = pct >= 0 ? '▲' : '▼';
  return `<span class="change ${cls}">${arrow} ${Math.abs(pct).toFixed(2)}%</span>`;
};
const scoreBadge = (score, rating) => {
  if (score == null) return '<span style="color:var(--muted)">—</span>';
  const cls = rating === 'buy' ? 'buy' : rating === 'sell' ? 'sell' : 'hold';
  return `<span class="score-badge ${cls}">${score}</span>`;
};

// ===== DATA FETCHING =====
async function fetchBTC() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin?localization=false&tickers=false&community_data=false&developer_data=false');
    const d = await r.json();
    const price = d.market_data.current_price.usd;
    const change24 = d.market_data.price_change_percentage_24h;
    const high24 = d.market_data.high_24h.usd;
    const low24 = d.market_data.low_24h.usd;
    const mcap = d.market_data.market_cap.usd;
    const vol = d.market_data.total_volume.usd;
    const ath = d.market_data.ath.usd;

    document.getElementById('btcPrice').innerHTML = `$${fmt(price, 0)} ${changeHtml(change24)}`;
    document.getElementById('btcChange').textContent = `ATH: $${fmt(ath, 0)} (${((price/ath-1)*100).toFixed(1)}%)`;
    document.getElementById('btcHigh').textContent = '$' + fmt(high24, 0);
    document.getElementById('btcLow').textContent = '$' + fmt(low24, 0);
    document.getElementById('btcMcap').textContent = fmtB(mcap);
    document.getElementById('btcVol').textContent = fmtB(vol);
  } catch(e) {
    document.getElementById('btcPrice').innerHTML = '<span class="loading">加载失败</span>';
  }
}

async function fetchFearGreed() {
  try {
    const r = await fetch('https://api.alternative.me/fng/?limit=7');
    const d = await r.json();
    const current = d.data[0];
    const val = parseInt(current.value);
    const label = current.value_classification;

    document.getElementById('fgValue').textContent = val;
    document.getElementById('fgValue').style.color =
      val <= 25 ? 'var(--red)' : val <= 45 ? 'var(--amber)' : val <= 55 ? 'var(--text)' : 'var(--green)';
    document.getElementById('fgLabel').textContent = label;
    document.getElementById('fgLabel').style.color =
      val <= 25 ? 'var(--red)' : val <= 45 ? 'var(--amber)' : val <= 55 ? 'var(--text)' : 'var(--green)';
    document.getElementById('fgMarker').style.left = val + '%';
    document.getElementById('fgMarker').style.background =
      val <= 25 ? 'var(--red)' : val <= 45 ? 'var(--amber)' : val <= 55 ? 'var(--text)' : 'var(--green)';

    // 7-day history
    const hist = d.data.slice(0, 7).map(x => `${new Date(x.timestamp*1000).toLocaleDateString('zh-CN',{month:'short',day:'numeric'})} ${x.value}`).join(' → ');
    document.getElementById('fgHistory').textContent = '7日趋势: ' + hist;
  } catch(e) {
    document.getElementById('fgValue').textContent = '?';
  }
}

async function fetchStockQuote(ticker) {
  // Use Yahoo Finance v8 API (public, no key needed)
  try {
    const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`);
    const d = await r.json();
    const meta = d.chart.result[0].meta;
    return {
      price: meta.regularMarketPrice,
      prevClose: meta.previousClose || meta.chartPreviousClose,
      change: ((meta.regularMarketPrice / (meta.previousClose || meta.chartPreviousClose)) - 1) * 100,
      marketCap: meta.regularMarketPrice * (meta.regularMarketVolume || 0), // approximate
    };
  } catch(e) {
    return null;
  }
}

async function fetchStocks() {
  const tickers = WATCHLIST.map(w => w.ticker).join(',');
  // Try Yahoo Finance batch
  try {
    const promises = WATCHLIST.map(async (w) => {
      try {
        const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${w.ticker}?interval=1d&range=5d`);
        const d = await r.json();
        const result = d.chart.result[0];
        const meta = result.meta;
        const price = meta.regularMarketPrice;
        const prevClose = meta.chartPreviousClose;
        const change = ((price / prevClose) - 1) * 100;
        return { ...w, price, change, loaded: true };
      } catch(e) {
        return { ...w, price: null, change: null, loaded: false };
      }
    });
    const stocks = await Promise.all(promises);
    renderStocks(stocks, 'all');
    window._stockData = stocks;
  } catch(e) {
    document.getElementById('stockList').innerHTML = '<tr><td colspan="7" class="loading">股票数据加载失败</td></tr>';
  }
}

function renderStocks(stocks, filter) {
  const filtered = filter === 'all' ? stocks : stocks.filter(s => s.sector === filter);
  const tbody = document.getElementById('stockList');
  tbody.innerHTML = filtered.map(s => `
    <tr>
      <td><span class="ticker">${s.ticker}</span></td>
      <td><span>${s.name}</span></td>
      <td style="text-align:right;font-weight:600">${s.price ? '$' + fmt(s.price) : '—'}</td>
      <td style="text-align:right">${s.change != null ? changeHtml(s.change) : '—'}</td>
      <td style="text-align:right;color:var(--muted)">—</td>
      <td style="text-align:right;color:var(--muted)">—</td>
      <td style="text-align:right">${scoreBadge(s.score, s.rating)}</td>
    </tr>
  `).join('');
}

function switchTab(el, filter) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (window._stockData) renderStocks(window._stockData, filter);
}

async function fetchCrypto() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=8&sparkline=false&price_change_percentage=24h');
    const coins = await r.json();
    document.getElementById('cryptoList').innerHTML = coins.map(c => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a24">
        <div style="display:flex;align-items:center;gap:8px">
          <img src="${c.image}" width="20" height="20" style="border-radius:50%">
          <span style="font-weight:600">${c.symbol.toUpperCase()}</span>
          <span style="color:var(--muted);font-size:12px">#${c.market_cap_rank}</span>
        </div>
        <div style="text-align:right">
          <div style="font-weight:600">$${fmt(c.current_price, c.current_price > 100 ? 0 : 2)}</div>
          <div>${changeHtml(c.price_change_percentage_24h)}</div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('cryptoList').innerHTML = '<div class="loading">加载失败</div>';
  }
}

async function fetchGlobalMarket() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/global');
    const d = await r.json().then(r => r.data);
    const total_mcap = d.total_market_cap.usd;
    const total_vol = d.total_volume.usd;
    const btc_dom = d.market_cap_percentage.btc;
    const eth_dom = d.market_cap_percentage.eth;

    document.getElementById('globalMarket').innerHTML = `
      <div class="mini-grid">
        <div class="mini-stat"><div class="label">加密总市值</div><div class="value">$${fmtB(total_mcap)}</div></div>
        <div class="mini-stat"><div class="label">24h 总成交</div><div class="value">$${fmtB(total_vol)}</div></div>
        <div class="mini-stat"><div class="label">BTC 占比</div><div class="value">${btc_dom.toFixed(1)}%</div></div>
        <div class="mini-stat"><div class="label">ETH 占比</div><div class="value">${eth_dom.toFixed(1)}%</div></div>
        <div class="mini-stat"><div class="label">活跃币种</div><div class="value">${d.active_cryptocurrencies?.toLocaleString() || '—'}</div></div>
        <div class="mini-stat"><div class="label">24h 涨跌</div><div class="value">${changeHtml(d.market_cap_change_percentage_24h_usd)}</div></div>
      </div>
    `;
  } catch(e) {
    document.getElementById('globalMarket').innerHTML = '<div class="loading">加载失败</div>';
  }
}

function renderReports() {
  document.getElementById('reportList').innerHTML = REPORTS.map(r => `
    <div class="news-item">
      <div class="title">
        <span class="ticker" style="margin-right:8px">${r.ticker}</span>
        ${r.title}
        ${r.score ? scoreBadge(r.score, r.score >= 70 ? 'buy' : 'hold') : ''}
      </div>
      <div class="source">${r.date}</div>
    </div>
  `).join('');
}

function renderNews() {
  // Static curated news (since we don't have a news API key)
  const news = [
    { title: 'SoFi 从 $33 跌至 $19，分析师称可能是"世代级入场点"', source: 'Seeking Alpha', date: '2天前' },
    { title: 'AMD 获得 Meta $100B+ AI GPU 订单', source: 'Reuters', date: '1周前' },
    { title: 'BTC 跌至 $69K，Fear & Greed 极度恐惧 (10)', source: 'CoinDesk', date: '今天' },
    { title: 'Fed 维持利率不变，市场等待降息信号', source: 'CNBC', date: '3天前' },
    { title: 'NuScale SMR 获得 NRC 许可，股价跌 42%', source: 'Bloomberg', date: '1周前' },
  ];
  document.getElementById('newsList').innerHTML = news.map(n => `
    <div class="news-item">
      <div class="title">${n.title}</div>
      <div class="source">${n.source} • ${n.date}</div>
    </div>
  `).join('');
}

// ===== INIT =====
async function refreshAll() {
  document.getElementById('lastUpdate').textContent = '刷新中...';
  await Promise.all([
    fetchBTC(),
    fetchFearGreed(),
    fetchStocks(),
    fetchCrypto(),
    fetchGlobalMarket(),
  ]);
  renderReports();
  renderNews();
  document.getElementById('lastUpdate').textContent =
    '更新于 ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

// Auto refresh every 60s
refreshAll();
